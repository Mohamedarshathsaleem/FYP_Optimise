name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: fyp_optimise_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, gd
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend assets
        run: npm run build

      - name: Create .env for CI
        run: |
          cp .env.example .env || cp .env .env.ci
          cat > .env << 'EOF'
          APP_NAME=FYP_Optimise
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=false
          APP_URL=http://127.0.0.1:8000

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=fyp_optimise_test
          DB_USERNAME=root
          DB_PASSWORD=password

          CACHE_DRIVER=array
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          EOF

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations and seeders
        run: php artisan migrate --force && php artisan db:seed --force

      - name: Start Laravel dev server
        run: php artisan serve --host=127.0.0.1 --port=8000 &

      - name: Wait for server to be ready
        run: npx wait-on http://127.0.0.1:8000 --timeout 30000

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
