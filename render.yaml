databases:
  - name: fyp-optimise-db
    databaseName: fyp_optimise
    user: fyp_user
    plan: free
    region: singapore

services:
  - type: web
    name: fyp-optimise
    runtime: php
    region: singapore
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: fyp-optimise-db
          property: connectionString
