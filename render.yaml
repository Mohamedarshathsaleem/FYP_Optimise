databases:
  - name: fyp-optimise-db
    databaseName: fyp_optimise
    user: fyp_user
    plan: free
    region: singapore

services:
  - type: web
    name: fyp-optimise
    runtime: docker
    region: singapore
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: fyp-optimise-db
          property: connectionString
